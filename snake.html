<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: Arial, sans-serif;
            color: white;
            flex-direction: column;
        }
        
        canvas {
            border: 2px solid #4CAF50;
            background-color: #000;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        
        .score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .lives {
            font-size: 24px;
            margin-bottom: 10px;
            color: #FF5252;
        }
        
        .controls {
            margin-top: 15px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="score">Счёт в раунде: <span id="scoreValue">0</span></div>
    <div class="lives">Жизни: <span id="livesValue">❤️❤️❤️</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        Управление: стрелки на клавиатуре<br>
        Нажмите любую стрелку для начала игры
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreValue');
        const livesElement = document.getElementById('livesValue');
        
        // Размер одной клетки
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // Переменные игры
        let snake = [];
        let dx = 1;
        let dy = 0;
        let food = {};
        let roundScore = 0;
        let totalScore = 0;
        let lives = 3;
        let gameStarted = false;
        let gameOverState = false;
        
        // Обновление отображения жизней
        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) {
                hearts += '❤️';
            }
            livesElement.textContent = hearts;
        }
        
        // Игровой цикл
        function gameLoop() {
            if (!gameStarted) return;
            
            // Перемещение змейки
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Проверка на столкновение со стенами
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                handleCollision();
                return;
            }
            
            // Проверка на столкновение с самой собой
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    handleCollision();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Проверка: съела ли змейка еду
            if (head.x === food.x && head.y === food.y) {
                roundScore++;
                scoreElement.textContent = roundScore;
                generateFood();
            } else {
                snake.pop();
            }
            
            draw();
            setTimeout(gameLoop, 100);
        }
        
        // Обработка столкновения со стеной или с самой собой
        function handleCollision() {
            lives--;
            updateLivesDisplay();
            
            if (lives <= 0) {
                gameOver();
            } else {
                startNewRound();
            }
        }
        
        // Начало нового раунда
        function startNewRound() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1;
            dy = 0;
            roundScore = 0;
            scoreElement.textContent = roundScore;
            generateFood();
            gameStarted = true;
            draw();
            setTimeout(gameLoop, 100);
        }
        
        // Отрисовка игры
        function draw() {
            // Очистка экрана
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Отрисовка змейки
            ctx.fillStyle = '#4CAF50';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }
            
            // Отрисовка еды
            ctx.fillStyle = '#FF5252';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }
        
        // Генерация новой еды
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // Проверка, чтобы еда не появилась на змейке
            for (let i = 0; i < snake.length; i++) {
                if (food.x === snake[i].x && food.y === snake[i].y) {
                    generateFood();
                    return;
                }
            }
        }
        
        // Конец игры
        function gameOver() {
            gameStarted = false;
            gameOverState = true;
            totalScore += roundScore;
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Игра окончена!', canvas.width / 2, canvas.height / 2 - 30);
            ctx.font = '24px Arial';
            ctx.fillText('Сумма очков за 3 раунда: ' + totalScore, canvas.width / 2, canvas.height / 2 + 10);
            ctx.font = '16px Arial';
            ctx.fillText('Нажмите пробел для новой игры', canvas.width / 2, canvas.height / 2 + 45);
        }
        
        // Рестарт игры
        function restartGame() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1;
            dy = 0;
            lives = 3;
            totalScore = 0;
            roundScore = 0;
            scoreElement.textContent = roundScore;
            updateLivesDisplay();
            generateFood();
            gameStarted = true;
            gameOverState = false;
            draw();
            gameLoop();
        }
        
        // Обработка нажатий клавиш
        document.addEventListener('keydown', function(event) {
            if (!gameStarted && !gameOverState && event.code !== 'Space') {
                gameStarted = true;
                snake = [
                    {x: 10, y: 10},
                    {x: 9, y: 10},
                    {x: 8, y: 10}
                ];
                generateFood();
                gameLoop();
            }
            
            switch(event.key) {
                case 'ArrowUp':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case 'ArrowDown':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case 'ArrowLeft':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case 'ArrowRight':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
                case ' ':
                    if (gameOverState) {
                        restartGame();
                    }
                    break;
            }
        });
        
        // Начальная отрисовка
        draw();
    </script>
</body>
</html>
